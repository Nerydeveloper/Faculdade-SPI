<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/comprando/selctformadepagamento.css">
    <title>NYASHOP | Forma de pagamento</title>
</head>
<body>
    <header>
        <div class="logo"><h1><a href="../../index.html">NYASHOP</a></h1></div>
        <div class="barra-de-pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" placeholder="Buscar produto">
            <img src="../../midias/img/pesquisa.png"width=20px alt="">
        </div>
        <div class="menu">
            <ul>
                <li><img src="../../midias/img/carrinho/sacola-de-compras.png" alt=""></li>
                <li onclick="telaCadastro()">Cadastre-se</li>
                <li id="minhaconta" onclick="telalogin()"><img src="../..//midias/img/login/entrar.png" alt=""></li>
            </ul>
        </div>
    </header>



    <main>
        <section class="container-section-sfp">
            <div class="sfp-titulo">Selecionar forma de pagamento</div>
            <div class="sfp-formasdepagamento">
                <div class="sfp-pix"><input type="submit" name="" id="" value="PIX"></div>
                <div class="sfp-cartao"><input type="submit" name="" id="" value="CARTÃO"></div>
                <div class="sfp-paypal"><input type="submit" name="" id="" value="PAYPAL"></div>
                <div class="sfp-boleto"><input type="submit" name="" id="" value="BOLETO"></div>
            </div>
            <div class="sfp-preencherdados"></div>
        </section>
        <section class="container-bottom">
            <div class="sfp-valorfinalcompra">
                <div class="sfpvfc-titulo">Valor total</div>
                <div class="sfpvfc-valor">
                    <div class="valortotal">2930.93</div>
                    <div class="numparcelas">10X de 78,90</div>
                    <div class="sfpvfc-valor-fdp">cartão</div>
                </div>
            </div>
            <section class="container-button">
                <div class="btn-continuar">
                    <input type="submit" name="" id="" value="Continuar">
                </div>
            </section>
        </section>
    
    </main>
</body>
</html>
